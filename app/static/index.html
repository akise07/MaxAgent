<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaxAgent - AI 助手</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div id="app">
        <!-- 左侧会话栏 -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                    <span>MaxAgent</span>
                </div>
                <button id="new-chat-btn" class="btn-new-chat" title="新对话">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    新对话
                </button>
            </div>
            <div class="sidebar-search">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="search-input" placeholder="搜索对话...">
            </div>
            <div id="conversation-list" class="conversation-list">
                <!-- 会话列表由 JS 动态渲染 -->
            </div>
            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="status-text">就绪</span>
                </div>
            </div>
        </aside>

        <!-- 右侧主区域 -->
        <main id="main">
            <!-- 欢迎页 -->
            <div id="welcome" class="welcome">
                <div class="welcome-content">
                    <div class="welcome-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 6v6l4 2"/>
                        </svg>
                    </div>
                    <h1>有什么我可以帮您的？</h1>
                    <p>开始对话，探索无限可能</p>
                    <div class="welcome-suggestions">
                        <div class="suggestion-chip" data-text="用简单的话解释什么是量子计算">什么是量子计算？</div>
                        <div class="suggestion-chip" data-text="帮我写一个Python函数，计算斐波那契数列">写一个 Python 函数</div>
                        <div class="suggestion-chip" data-text="介绍一下机器学习的三种主要类型">机器学习类型</div>
                        <div class="suggestion-chip" data-text="帮我规划一个学习Python的路线图">学习 Python 路线</div>
                    </div>
                </div>
            </div>

            <!-- 对话区域 -->
            <div id="chat-area" class="chat-area" style="display:none;">
                <div class="chat-header">
                    <span id="chat-title">新对话</span>
                </div>
                <div id="messages" class="messages">
                    <!-- 消息由 JS 动态渲染 -->
                </div>
                <div class="input-area">
                    <div class="input-wrapper">
                        <textarea id="message-input" rows="1" placeholder="输入消息..." autocomplete="off"></textarea>
                        <button id="send-btn" class="btn-send" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
