<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaxAgent - AI 助手</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div id="app">
        <!-- 左侧边栏 -->
        <aside id="sidebar">
            <div class="sidebar-top">
                <div class="logo">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                    <span>MaxAgent</span>
                </div>

                <nav class="nav-actions" aria-label="main actions">
                    <button id="new-task-btn" class="nav-item" type="button">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        <span data-i18n="sidebar.new_task">新建任务</span>
                    </button>
                    <button id="skills-btn" class="nav-item" type="button">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                        </svg>
                        <span data-i18n="sidebar.skills">技能</span>
                    </button>
                    <button id="automation-btn" class="nav-item" type="button">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                        </svg>
                        <span data-i18n="sidebar.automation">自动化</span>
                    </button>
                </nav>
            </div>

            <div class="sidebar-tasks">
                <div class="tasks-header">
                    <span data-i18n="sidebar.tasks">任务列表</span>
                </div>
                <div class="sidebar-search">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" id="search-input" data-i18n-placeholder="sidebar.search_sessions" placeholder="搜索任务...">
                </div>
                <div id="conversation-list" class="conversation-list"></div>
            </div>

            <div class="sidebar-footer">
                <div class="user-bar-wrap">
                    <div id="user-menu" class="user-menu" hidden>
                        <button type="button" class="user-menu-item" data-action="settings">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="3"/>
                                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                            </svg>
                            <span data-i18n="sidebar.settings">设置</span>
                        </button>
                        <button type="button" class="user-menu-item" data-action="appearance">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="5"/>
                                <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                                <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                            </svg>
                            <span data-i18n="sidebar.appearance">外观</span>
                            <span id="theme-label" class="menu-meta">Dark</span>
                        </button>
                        <div class="user-menu-item has-submenu" data-action="language">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="2" y1="12" x2="22" y2="12"/>
                                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                            </svg>
                            <span data-i18n="sidebar.language">语言</span>
                            <span id="lang-label" class="menu-meta">中文</span>
                            <div class="lang-submenu">
                                <button type="button" class="lang-option" data-lang="zh-CN">中文</button>
                                <button type="button" class="lang-option" data-lang="en">English</button>
                            </div>
                        </div>
                        <button type="button" class="user-menu-item" data-action="open-home">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                                <polyline points="9 22 9 12 15 12 15 22"/>
                            </svg>
                            <span data-i18n="sidebar.open_home">打开 Home 目录</span>
                        </button>
                    </div>

                    <button id="user-bar" class="user-bar" type="button" aria-haspopup="menu" aria-expanded="false">
                        <div class="user-avatar">M</div>
                        <div class="user-info">
                            <div class="user-name">MaxAgent</div>
                            <div class="status-indicator">
                                <span class="status-dot" id="status-dot"></span>
                                <span id="status-text" data-i18n="status.ready">就绪</span>
                            </div>
                        </div>
                        <svg class="user-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                    </button>
                </div>
            </div>
        </aside>

        <main id="main">
            <!-- ===== 创建任务页（全新对话框） ===== -->
            <div id="new-task-page" class="new-task-page" style="display:none;">
                <div class="task-create-wrap">
                    <!-- 角色形象：对话框右上角，紧贴 -->
                    <div class="task-character" aria-hidden="true">
                        <svg class="character" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
                                    <stop offset="0%" stop-color="#7ec8ff"></stop>
                                    <stop offset="55%" stop-color="#5aa8e8"></stop>
                                    <stop offset="100%" stop-color="#4a90d9"></stop>
                                </linearGradient>
                                <linearGradient id="faceGrad" x1="0" y1="0" x2="0" y2="1">
                                    <stop offset="0%" stop-color="#1e2a44"></stop>
                                    <stop offset="100%" stop-color="#121a2c"></stop>
                                </linearGradient>
                                <linearGradient id="earGrad" x1="0" y1="0" x2="1" y2="1">
                                    <stop offset="0%" stop-color="#9fd4ff"></stop>
                                    <stop offset="100%" stop-color="#5aa8e8"></stop>
                                </linearGradient>
                            </defs>
                            <line x1="60" y1="22" x2="60" y2="10" stroke="#6eb6ef" stroke-width="4" stroke-linecap="round"></line>
                            <circle cx="60" cy="7" r="4.5" fill="#8fd0ff"></circle>
                            <rect x="14" y="42" width="16" height="28" rx="8" fill="url(#earGrad)"></rect>
                            <rect x="90" y="42" width="16" height="28" rx="8" fill="url(#earGrad)"></rect>
                            <path d="M30 40c0-18 13-30 30-30s30 12 30 30" fill="none" stroke="#6eb6ef" stroke-width="6" stroke-linecap="round"></path>
                            <rect x="28" y="28" width="64" height="72" rx="22" fill="url(#bodyGrad)"></rect>
                            <rect x="38" y="42" width="44" height="34" rx="12" fill="url(#faceGrad)"></rect>
                            <circle cx="50" cy="58" r="4.2" fill="#9fd4ff"></circle>
                            <circle cx="70" cy="58" r="4.2" fill="#9fd4ff"></circle>
                            <circle cx="51.2" cy="56.8" r="1.3" fill="#eaf7ff"></circle>
                            <circle cx="71.2" cy="56.8" r="1.3" fill="#eaf7ff"></circle>
                            <path d="M50 68c3 4 17 4 20 0" fill="none" stroke="#8ecfff" stroke-width="2.4" stroke-linecap="round"></path>
                            <circle cx="52" cy="86" r="3" fill="#b7e4ff" opacity="0.9"></circle>
                            <circle cx="60" cy="86" r="3" fill="#8fd0ff" opacity="0.75"></circle>
                            <circle cx="68" cy="86" r="3" fill="#6eb6ef" opacity="0.65"></circle>
                            <rect x="18" y="58" width="12" height="22" rx="6" fill="#6eb6ef"></rect>
                            <rect x="90" y="58" width="12" height="22" rx="6" fill="#6eb6ef"></rect>
                        </svg>
                    </div>

                    <div class="task-composer" role="dialog" aria-labelledby="task-composer-title">
                        <!-- 1. 顶部能力快捷入口 -->
                        <div class="task-capability-bar">
                            <button type="button" class="capability-chip" data-capability="docs" data-prompt="请帮我处理文档：">
                                <span class="cap-icon">📄</span>
                                <span data-i18n="task.cap_docs">文档处理</span>
                            </button>
                            <button type="button" class="capability-chip" data-capability="finance" data-prompt="请协助完成金融服务相关任务：">
                                <span class="cap-icon">💰</span>
                                <span data-i18n="task.cap_finance">金融服务</span>
                            </button>
                            <button type="button" class="capability-chip" data-capability="data" data-prompt="请进行数据分析及可视化：">
                                <span class="cap-icon">📊</span>
                                <span data-i18n="task.cap_data">数据分析及可视化</span>
                            </button>
                            <button type="button" class="capability-chip capability-more" id="capability-more-btn">
                                <span class="cap-icon">✨</span>
                                <span data-i18n="task.cap_more">更多</span>
                            </button>
                            <button type="button" id="close-new-task-btn" class="task-composer-close" aria-label="Close">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                                </svg>
                            </button>
                        </div>

                        <!-- 2. 主输入区 -->
                        <div class="task-input-shell">
                            <div id="task-attachments" class="task-attachments" hidden></div>
                            <textarea
                                id="task-input"
                                class="task-input"
                                rows="5"
                                data-i18n-placeholder="task.input_placeholder"
                                placeholder="描述你的任务目标或指令…"
                            ></textarea>

                            <!-- 3. 输入区工具栏 -->
                            <div class="task-input-toolbar">
                                <div class="task-toolbar-left">
                                    <div class="plus-menu-wrap">
                                        <button type="button" class="task-plus-btn" id="task-plus-btn" title="附加" aria-haspopup="menu">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                                                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                                            </svg>
                                        </button>
                                        <div id="task-plus-menu" class="plus-menu" hidden>
                                            <button type="button" class="plus-menu-item" data-plus="file">
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                                                <span data-i18n="task.plus_file">添加文件</span>
                                            </button>
                                            <button type="button" class="plus-menu-item" data-plus="ref">
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                                                <span data-i18n="task.plus_ref">引用对话中的文件</span>
                                            </button>
                                            <button type="button" class="plus-menu-item" data-plus="skill">
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                                                <span data-i18n="task.plus_skill">技能</span>
                                            </button>
                                            <button type="button" class="plus-menu-item" data-plus="mcp">
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                                                <span data-i18n="task.plus_mcp">连接器（MCP）</span>
                                            </button>
                                        </div>
                                    </div>
                                    <input type="file" id="task-file-input" hidden multiple>
                                </div>

                                <div class="task-toolbar-right">
                                    <div class="model-picker-wrap">
                                        <button type="button" id="task-model-btn" class="model-picker-btn" aria-haspopup="listbox">
                                            <span id="task-model-label">hy3</span>
                                            <svg class="chev" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                                        </button>
                                        <div id="task-model-menu" class="dropdown-menu model-menu" hidden></div>
                                    </div>
                                    <button type="button" id="task-send-btn" class="task-send-btn" disabled title="发送" data-i18n-title="task.send">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- 4. 底部配置条 -->
                        <div class="task-config-bar">
                            <div class="config-dropdown-wrap">
                                <button type="button" id="workspace-btn" class="config-dropdown-btn">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                                    <span id="workspace-label" data-i18n="task.ws_select">选择工作空间</span>
                                    <svg class="chev" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                                </button>
                                <div id="workspace-menu" class="dropdown-menu" hidden>
                                    <button type="button" class="dropdown-item" data-workspace="select">
                                        <span data-i18n="task.ws_select">选择工作空间</span>
                                    </button>
                                    <button type="button" class="dropdown-item" data-workspace="none">
                                        <span data-i18n="task.ws_none">不选择工作空间</span>
                                    </button>
                                </div>
                            </div>

                            <div class="config-dropdown-wrap">
                                <button type="button" id="permission-btn" class="config-dropdown-btn">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                    <span id="permission-label" data-i18n="task.perm_default">默认权限</span>
                                    <svg class="chev" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                                </button>
                                <div id="permission-menu" class="dropdown-menu" hidden>
                                    <button type="button" class="dropdown-item" data-permission="default">
                                        <span data-i18n="task.perm_default">默认权限</span>
                                    </button>
                                    <button type="button" class="dropdown-item" data-permission="full">
                                        <span data-i18n="task.perm_full">允许完全访问</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 欢迎页 -->
            <div id="welcome" class="welcome">
                <div class="welcome-content">
                    <div class="welcome-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 6v6l4 2"/>
                        </svg>
                    </div>
                    <h1 data-i18n="chat.welcome_title">有什么我可以帮您的？</h1>
                    <p data-i18n="chat.welcome_subtitle">开始对话，探索无限可能</p>
                    <button type="button" id="welcome-new-task-btn" class="btn-primary-lg" data-i18n="sidebar.new_task">新建任务</button>
                </div>
            </div>

            <!-- 对话区域 -->
            <div id="chat-area" class="chat-area" style="display:none;">
                <div class="chat-header">
                    <span id="chat-title" data-i18n="sidebar.new_task">新对话</span>
                </div>
                <div id="messages" class="messages"></div>
                <div class="input-area">
                    <div class="input-wrapper">
                        <textarea id="message-input" rows="1" data-i18n-placeholder="chat.message_placeholder" placeholder="输入消息..." autocomplete="off"></textarea>
                        <button id="send-btn" class="btn-send" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <div id="panel-skills" class="side-panel" style="display:none;">
                <div class="side-panel-inner">
                    <h2 data-i18n="sidebar.skills">技能</h2>
                    <p data-i18n="skills.select_hint">技能库即将上线</p>
                </div>
            </div>
            <div id="panel-automation" class="side-panel" style="display:none;">
                <div class="side-panel-inner">
                    <h2 data-i18n="sidebar.automation">自动化</h2>
                    <p data-i18n="cron.no_jobs">自动化任务即将上线</p>
                </div>
            </div>
        </main>
    </div>

    <!-- ===== 设置页：左右两栏 ===== -->
    <div id="settings-modal" class="settings-overlay" hidden>
        <div class="settings-backdrop" data-close-modal></div>
        <div class="settings-shell" role="dialog" aria-modal="true" aria-labelledby="settings-title">
            <aside class="settings-nav">
                <div class="settings-nav-header">
                    <h3 id="settings-title" data-i18n="sidebar.settings">设置</h3>
                </div>
                <button type="button" class="settings-nav-item active" data-settings-tab="system">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    <span data-i18n="settings.tab_system">系统设置</span>
                </button>
                <button type="button" class="settings-nav-item" data-settings-tab="memory">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    <span data-i18n="settings.tab_memory">记忆</span>
                </button>
                <button type="button" class="settings-nav-item" data-settings-tab="models">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 1 3 3v1h2a3 3 0 0 1 0 6h-1v1a3 3 0 0 1-6 0v-1H9a3 3 0 0 1 0-6h2V5a3 3 0 0 1 3-3z"/></svg>
                    <span data-i18n="settings.tab_models">模型</span>
                </button>
            </aside>

            <section class="settings-content">
                <button type="button" class="settings-close" data-close-modal aria-label="Close">×</button>

                <!-- 系统设置 -->
                <div class="settings-panel" id="settings-panel-system">
                    <h2 data-i18n="settings.tab_system">系统设置</h2>
                    <div class="settings-row">
                        <label data-i18n="sidebar.appearance">外观</label>
                        <button type="button" id="settings-theme-btn" class="btn-secondary"></button>
                    </div>
                    <div class="settings-row">
                        <label data-i18n="sidebar.language">语言</label>
                        <div class="lang-switch">
                            <button type="button" class="btn-secondary lang-option" data-lang="zh-CN">中文</button>
                            <button type="button" class="btn-secondary lang-option" data-lang="en">English</button>
                        </div>
                    </div>
                    <div class="settings-row">
                        <label data-i18n="status.model_name">默认模型</label>
                        <span id="settings-model">-</span>
                    </div>
                    <div class="settings-row">
                        <label data-i18n="config.base_url">API 地址</label>
                        <span id="settings-endpoint">-</span>
                    </div>
                </div>

                <!-- 记忆 -->
                <div class="settings-panel" id="settings-panel-memory" hidden>
                    <h2 data-i18n="settings.tab_memory">记忆</h2>
                    <p class="settings-hint" data-i18n="settings.memory_hint">记忆文件位于项目 home/memory 目录，可在此查看说明。</p>
                    <div class="settings-row">
                        <label>memory</label>
                        <button type="button" id="open-memory-btn" class="btn-secondary" data-i18n="sidebar.open_home">打开 Home 目录</button>
                    </div>
                </div>

                <!-- 模型列表 -->
                <div class="settings-panel" id="settings-panel-models" hidden>
                    <div class="settings-panel-head">
                        <h2 data-i18n="settings.tab_models">模型</h2>
                        <button type="button" id="model-add-btn" class="btn-primary-sm" data-i18n="settings.add_model">添加模型</button>
                    </div>
                    <div id="model-list" class="model-list"></div>
                </div>

                <!-- 模型编辑（API 配置） -->
                <div class="settings-panel" id="settings-panel-model-edit" hidden>
                    <div class="settings-panel-head">
                        <button type="button" id="model-edit-back" class="btn-text">← <span data-i18n="settings.back">返回</span></button>
                        <h2 id="model-edit-title" data-i18n="settings.edit_model">编辑模型</h2>
                    </div>
                    <form id="model-edit-form" class="model-form">
                        <input type="hidden" id="model-edit-id" value="">
                        <label class="form-field">
                            <span data-i18n="settings.model_name">显示名称</span>
                            <input type="text" id="model-edit-name" placeholder="hy3" autocomplete="off">
                        </label>
                        <label class="form-field">
                            <span data-i18n="settings.api_endpoint">API 端点</span>
                            <input type="text" id="model-edit-endpoint" placeholder="http://localhost:8111/v1" autocomplete="off">
                        </label>
                        <label class="form-field">
                            <span data-i18n="settings.api_key">API Key</span>
                            <input type="password" id="model-edit-key" placeholder="留空则不修改" autocomplete="off">
                        </label>
                        <label class="form-field">
                            <span data-i18n="settings.model_id">模型 ID</span>
                            <input type="text" id="model-edit-modelid" placeholder="hy3" autocomplete="off">
                        </label>
                        <label class="form-check">
                            <input type="checkbox" id="model-edit-default">
                            <span data-i18n="settings.set_default">设为默认模型</span>
                        </label>
                        <fieldset class="advanced-section">
                            <legend data-i18n="settings.advanced">高级配置</legend>
                            <div class="advanced-grid">
                                <label class="form-check">
                                    <input type="checkbox" id="model-adv-tool">
                                    <span data-i18n="settings.adv_tool">工具调用</span>
                                </label>
                                <label class="form-check">
                                    <input type="checkbox" id="model-adv-image">
                                    <span data-i18n="settings.adv_image">图片输入</span>
                                </label>
                                <label class="form-check">
                                    <input type="checkbox" id="model-adv-thinking">
                                    <span data-i18n="settings.adv_thinking">思考模式</span>
                                </label>
                                <label class="form-check">
                                    <input type="checkbox" id="model-adv-thinking-only">
                                    <span data-i18n="settings.adv_thinking_only">仅思考模式</span>
                                </label>
                                <label class="form-check">
                                    <input type="checkbox" id="model-adv-allow-disable">
                                    <span data-i18n="settings.adv_allow_disable">允许关闭思考</span>
                                </label>
                            </div>
                            <label class="form-field" id="model-adv-intensity-group">
                                <span data-i18n="settings.adv_default_intensity">默认思考强度</span>
                                <select id="model-adv-default-intensity"></select>
                            </label>
                            <div class="form-field" id="model-adv-supported-group">
                                <span data-i18n="settings.adv_supported_intensity">支持的思考强度</span>
                                <div class="check-row check-row-5" id="model-adv-supported-wrap"></div>
                            </div>
                            <div class="form-row">
                                <label class="form-field">
                                    <span data-i18n="settings.adv_input">输入</span>
                                    <input type="number" min="0" step="1" id="model-adv-input" placeholder="500000" autocomplete="off">
                                    <div class="quick-values" data-target="model-adv-input" data-multiplier="1024">
                                        <button type="button" data-val="32">32K</button>
                                        <button type="button" data-val="64">64K</button>
                                        <button type="button" data-val="128">128K</button>
                                        <button type="button" data-val="256">256K</button>
                                    </div>
                                </label>
                                <label class="form-field">
                                    <span data-i18n="settings.adv_output">输出</span>
                                    <input type="number" min="0" step="1" id="model-adv-output" placeholder="64000" autocomplete="off">
                                    <div class="quick-values" data-target="model-adv-output" data-multiplier="1024">
                                        <button type="button" data-val="8">8K</button>
                                        <button type="button" data-val="16">16K</button>
                                        <button type="button" data-val="32">32K</button>
                                        <button type="button" data-val="64">64K</button>
                                    </div>
                                </label>
                            </div>
                        </fieldset>
                        <div class="form-actions">
                            <button type="button" id="model-edit-delete" class="btn-danger" hidden data-i18n="settings.delete">删除</button>
                            <button type="submit" class="btn-primary-sm" data-i18n="settings.save">保存</button>
                        </div>
                    </form>
                </div>
            </section>
        </div>
    </div>

    <div id="toast" class="toast" hidden></div>

    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
